name: Release

# タグ push (v*.*.* 形式) をトリガーに MSI / NSIS を署名してリリース。
# Tauri Updater の自動更新に必要な latest.json も生成する。
#
# 必要な GitHub Secrets:
#   TAURI_SIGNING_PRIVATE_KEY       : src-tauri/signing/easycursorswap の内容 (base64)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD: 鍵のパスフレーズ (パスなしなら設定不要)
#
# オプション (クラッシュレポート Cloudflare Worker 連携):
#   EASY_CURSOR_SWAP_CRASH_REPORT_ENDPOINT : Worker URL
#                                            (例: https://easy-cursor-swap-crash-report.<sub>.workers.dev/crash)
#   EASY_CURSOR_SWAP_CRASH_REPORT_APP_TOKEN: Worker `wrangler secret put ALLOWED_ORIGIN` した値と同一の文字列
#   未設定でビルドした場合は送信機能ごと無効化される (config.crash_reporting=true でも skip)。
#
# オプション (SignPath Authenticode 署名):
#   SIGNPATH_API_TOKEN          : SignPath User Settings → API Tokens で発行
#   SIGNPATH_ORGANIZATION_ID    : SignPath Organization Settings の UUID
#   SIGNPATH_SIGNING_POLICY_SLUG: 'test-signing' (テスト) / 'release-signing' (本番)
#   いずれかが未設定なら署名ステップは skip される。
#
# 2026-05-21 時点で SignPath Foundation OSS 一次申請は外部認知不足を理由に保留中
# (詳細は docs/authenticode_signing.md)。SIGNPATH_* secret は未投入のままなので、
# 下記の SignPath 関連ステップは現状すべて skip される。再申請通過時に Secret を
# 投入するだけで自動的に有効化される設計のため、本ワークフロー側のコードは変更不要。
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  # 手動トリガー (SignPath / CI 配線の試走用)。tag フィルタは厳格な semver のみ
  # なので、suffix 付きの試走タグは push イベントでは起動しない。手動 dispatch では
  # 任意の branch/tag を選択してフルパイプラインを実行できる。
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Draft Release のタグ名 (例 v0.1.0-signtest)'
        required: true
        default: 'v0.0.0-dryrun'

permissions:
  contents: write       # Draft Release 作成 + アセットアップロード用
  actions: read         # signpath/github-action-submit-signing-request が
                        # アップロード済み artifact を取得するのに必要
  id-token: write       # (将来) SignPath の OIDC 認証用 — 現状は api-token 経由なので
                        # 未使用だが、将来 keyless 認証に移行する際の準備として宣言

env:
  CARGO_TERM_COLOR: always
  # tag push と workflow_dispatch のどちらでも有効なタグ名を一元化。
  RELEASE_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  # -----------------------------------------------------------
  # Windows x64 / ARM64 バンドル生成 + 署名
  #
  # ARM64 は Surface Pro X 等の Snapdragon Windows デバイス向け。
  # クロスコンパイルのため `aarch64-pc-windows-msvc` ターゲットを追加し、
  # tauri-action の `args` で `--target` を指定する。
  # WebView2 は tauri.conf.json で `embedBootstrapper` を指定済みなので
  # オフライン環境でもインストール可能。
  # -----------------------------------------------------------
  build-windows:
    name: Build Windows bundles (${{ matrix.arch_label }})
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch_label: x64
          - target: aarch64-pc-windows-msvc
            arch_label: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # src-tauri/rust-toolchain.toml で `channel = "1.95.0"` にピン留めされて
      # いるため、dtolnay/rust-toolchain の targets: は `stable` には効くが
      # `1.95.0` には反映されない。src-tauri/ 内で `rustup target add` を実行
      # することで、pin された 1.95.0 toolchain に対して target を追加する。
      # `rust-toolchain.toml` 側の `targets = [...]` でも宣言済みだが、二重防御。
      - name: Ensure Rust target is installed for pinned toolchain
        shell: pwsh
        working-directory: src-tauri
        run: rustup target add ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm ci
        run: npm ci

      # -----------------------------------------------------------
      # CHANGELOG.md の該当バージョンのセクションを抜き出して
      # tauri-action の releaseBody に埋め込むための準備。
      # 該当エントリが無い場合はプレースホルダで通し、release CI 自体は止めない
      # (CHANGELOG 更新漏れに気付くきっかけが「リリースページが寂しい」になる)。
      # -----------------------------------------------------------
      - name: Extract CHANGELOG section for ${{ env.RELEASE_TAG }}
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $version = $tag -replace '^v',''
          Write-Host "Extracting CHANGELOG section for $version"
          $section = node scripts/release/extract-changelog-section.mjs $version
          if ($LASTEXITCODE -ne 0 -or -not $section) {
            Write-Warning "CHANGELOG section not found for $version - using placeholder"
            $section = "## $tag`n`n(CHANGELOG エントリ未登録)"
          }
          # GITHUB_OUTPUT に複数行で書き出すためのヒアドキュメント形式
          "section<<__CHANGELOG_EOF__" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $section                       | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "__CHANGELOG_EOF__"            | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Tauri build (MSI + NSIS, Updater 署名付き)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # クラッシュレポート送信用 credentials (option_env! で .rodata にリテラル埋め込み)。
          # GitHub Secrets で未設定なら空文字 → option_env! が Some("") を返す → embedded_credentials() が None で skip。
          # 設定方法: Repo Settings → Secrets and variables → Actions → New repository secret
          EASY_CURSOR_SWAP_CRASH_REPORT_ENDPOINT: ${{ secrets.EASY_CURSOR_SWAP_CRASH_REPORT_ENDPOINT }}
          EASY_CURSOR_SWAP_CRASH_REPORT_APP_TOKEN: ${{ secrets.EASY_CURSOR_SWAP_CRASH_REPORT_APP_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 'EasyCursorSwap ${{ env.RELEASE_TAG }}'
          args: --target ${{ matrix.target }}
          # releaseBody 構成:
          #   1) CHANGELOG.md の該当 [X.Y.Z] セクション本文 (動的)
          #   2) インストール / 自動アップデート / 動作要件 / 既知の制限 (静的)
          # matrix が x64/arm64 の 2 ジョブ走るが、tauri-action は同じ Draft Release に
          # 冪等にアップロード/上書きするため、両ジョブで releaseBody が一致していれば衝突しない。
          releaseBody: |
            ${{ steps.changelog.outputs.section }}

            ---

            ### インストール
            - **MSI x64** (推奨): `EasyCursorSwap_*_x64_ja-JP.msi` / `*_x64_en-US.msi`
            - **MSI ARM64**: `EasyCursorSwap_*_arm64_ja-JP.msi` / `*_arm64_en-US.msi`
            - **NSIS**: `EasyCursorSwap_*_x64-setup.exe` / `*_arm64-setup.exe`

            ### 自動アップデート
            Tauri Updater により署名検証済みの差分更新が配信されます。

            ### 動作要件
            - Windows 10 22H2 以降 / Windows 11 (x64 または ARM64)
            - WebView2 Evergreen Runtime (インストーラに Bootstrapper を埋め込み済み)

            ### 既知の制限
            - RDP / Citrix / RemoteApp は動作対象外
            - Windows Server は動作対象外
            - `.ani` の新規生成は未対応
          releaseDraft: true
          # v0.0.4 で provisional 期を卒業し、stable release として配布する。
          # SemVer 0.0.x の API 安定保証は依然 best-effort だが、GitHub Release の
          # Pre-release フラグは降ろし、Updater 経由でも通常版として配信する。
          prerelease: false
          includeUpdaterJson: true

      # -----------------------------------------------------------
      # SignPath による Authenticode 署名 (test-signing / release-signing)
      #
      # tauri-action が生成した未署名の .exe / .msi を ZIP に詰めて
      # SignPath に submit し、署名済み artifact を Draft Release に
      # 上書きアップロードする。SIGNPATH_* secrets が未設定なら skip。
      # -----------------------------------------------------------
      - name: Check SignPath secrets
        id: signpath-check
        shell: pwsh
        run: |
          $hasToken = -not [string]::IsNullOrEmpty($env:SIGNPATH_API_TOKEN)
          $hasOrg = -not [string]::IsNullOrEmpty($env:SIGNPATH_ORGANIZATION_ID)
          $enabled = $hasToken -and $hasOrg
          "enabled=$($enabled.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "SignPath enabled: $enabled"
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}

      - name: Collect installers for signing
        if: steps.signpath-check.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/${{ matrix.target }}/release/bundle"
          New-Item -ItemType Directory -Force -Path signing-input | Out-Null
          Get-ChildItem -Path "$bundle/nsis/*.exe", "$bundle/msi/*.msi" -ErrorAction SilentlyContinue |
            Copy-Item -Destination signing-input
          if ((Get-ChildItem signing-input).Count -eq 0) {
            Write-Error "No installers found under $bundle"
            exit 1
          }
          Compress-Archive -Path signing-input/* -DestinationPath installers.zip -Force

      - name: Upload unsigned installers (for SignPath)
        if: steps.signpath-check.outputs.enabled == 'true'
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-${{ matrix.arch_label }}
          path: installers.zip
          retention-days: 1

      - name: Submit to SignPath
        if: steps.signpath-check.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: 'easy-cursor-swap'
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG || 'test-signing' }}
          artifact-configuration-slug: 'tauri-installers'
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: 'signed'

      - name: Replace bundle installers with signed copies
        if: steps.signpath-check.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/${{ matrix.target }}/release/bundle"
          $signedFiles = Get-ChildItem signed -Recurse -Include *.exe, *.msi
          foreach ($f in $signedFiles) {
            if ($f.Extension -eq '.exe') {
              Copy-Item $f.FullName -Destination "$bundle/nsis/" -Force
            } else {
              Copy-Item $f.FullName -Destination "$bundle/msi/" -Force
            }
            Write-Host "Replaced: $($f.Name)"
          }

      # -----------------------------------------------------------
      # SignPath Authenticode 署名後に Tauri Updater 用の minisign 署名を再生成。
      # tauri-action が最初に作った .sig は SignPath 前のバイナリに対するもので、
      # 上書き後はハッシュが変わって Updater 側の verify が失敗する。
      # この step で .exe / .msi に対して .sig を作り直し、latest.json も更新する。
      # -----------------------------------------------------------
      - name: Re-sign installers with minisign after Authenticode
        if: steps.signpath-check.outputs.enabled == 'true'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $bundle = "src-tauri/target/${{ matrix.target }}/release/bundle"
          $files = Get-ChildItem -Path "$bundle/nsis/*.exe", "$bundle/msi/*.msi" -ErrorAction SilentlyContinue
          if (-not $files) { Write-Error "No installers found under $bundle for re-signing"; exit 1 }
          foreach ($f in $files) {
            Write-Host "Re-signing: $($f.FullName)"
            # tauri signer sign は鍵を TAURI_SIGNING_PRIVATE_KEY env から拾う。
            # --sign-file の生成物は <file>.sig (上書き)。
            npx --yes @tauri-apps/cli signer sign --sign-file $f.FullName
            if ($LASTEXITCODE -ne 0) { Write-Error "tauri signer sign failed for $($f.FullName)"; exit 1 }
          }
          # latest.json の signature を新 .sig 内容で上書き
          node scripts/release/patch-latest-json.mjs $bundle
          if ($LASTEXITCODE -ne 0) { Write-Error "patch-latest-json.mjs failed"; exit 1 }

      - name: Verify updater metadata integrity (post-resign)
        if: steps.signpath-check.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/${{ matrix.target }}/release/bundle"
          $candidates = @("$bundle/latest.json", "$bundle/updater/latest.json")
          $json = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $json) { Write-Error "latest.json not found"; exit 1 }
          $data = Get-Content $json -Raw | ConvertFrom-Json
          foreach ($name in $data.platforms.PSObject.Properties.Name) {
            $sig = $data.platforms.$name.signature
            if (-not $sig -or -not $sig.Contains('untrusted comment')) {
              Write-Error "Platform '$name' has malformed signature"
              exit 1
            }
          }
          Write-Host "All platform signatures look valid"

      - name: Upload signed installers to Draft Release
        if: steps.signpath-check.outputs.enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      # -----------------------------------------------------------
      # Updater 鍵ペア / latest.json 整合性チェック (--offline)。
      # tauri.conf.json の `plugins.updater.pubkey` と signing 公開鍵の一致のみ
      # 検証する (ネットワーク到達確認は draft release 時点ではエンドポイントが
      # 未公開なため skip)。万一鍵がずれていれば updater 自動更新が全クライアントで
      # 失敗するため、release.yml の最後で必ず検証する。
      # -----------------------------------------------------------
      - name: Verify updater keypair integrity (offline)
        shell: pwsh
        run: node scripts/check-updater-keypair.mjs --offline
