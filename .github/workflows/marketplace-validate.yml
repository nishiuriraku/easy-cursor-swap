name: Marketplace Theme Validate

# `cursorforge/index` リポジトリへの PR で使う雛形 (Phase 9-4)。
# 本リポジトリでは触らないが、index 側にコピペで使えるよう placeholder として置く。
#
# 想定: PR で `entries/*.json` または `themes/*.cursorpack` が追加されたとき、
# 以下を自動検証する。
#  1. メタデータ JSON のスキーマ
#  2. `.cursorpack` の SHA-256 が宣言値と一致
#  3. Ed25519 署名検証 (`authors/{github_username}.json` の公開鍵で)
#  4. サイズ閾値 (50 MB / 200 MB / 10 MB)
#  5. マルウェアハッシュ DB との照合 (clamav or VirusTotal API)
#
# scripts/marketplace/validate.mjs に検証ロジックを集約する設計。

on:
  pull_request:
    paths:
      - 'entries/**'
      - 'themes/**'
      - 'authors/**'

jobs:
  validate:
    name: Validate marketplace submission
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install validators
        run: npm ci

      - name: Detect changed entries
        id: changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          git diff --name-only "$BASE" "$HEAD" -- entries/ themes/ authors/ >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Schema + SHA-256 + signature validation
        run: node scripts/marketplace/validate.mjs
        env:
          CHANGED_FILES: ${{ steps.changes.outputs.list }}

      - name: Size thresholds
        run: |
          for f in $(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'themes/*.cursorpack'); do
            size=$(wc -c < "$f")
            if [ "$size" -gt 52428800 ]; then
              echo "::error file=$f::cursorpack size $size exceeds 50MB limit"
              exit 1
            fi
          done

      - name: Malware hash DB check (placeholder)
        run: echo "TODO: integrate VirusTotal API or clamav"
